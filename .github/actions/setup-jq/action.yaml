name: "Setup jq"
description: "Installs jq 1.8.x (latest) to replace the default jq on the runner"

inputs:
  version:
    description: "jq version to install"
    required: false
    default: "1.8.1"

runs:
  using: "composite"
  steps:
    - name: Install jq ${{ inputs.version }}
      shell: bash
      run: |
        ver=$(jq --version 2>/dev/null | cut -d- -f2)
        if ! command -v jq >/dev/null 2>&1 || [[ $ver != '${{ inputs.version }}' ]]; then
            curl -sLo /tmp/jq "https://github.com/jqlang/jq/releases/download/jq-${{ inputs.version }}/jq-linux-amd64"
            sudo install /tmp/jq /usr/local/bin/jq
            rm -f /tmp/jq
            ver=$(jq --version 2>/dev/null | cut -d- -f2)
            echo "✅ jq $ver installed" >> $GITHUB_STEP_SUMMARY
        else
            echo "✅ jq $ver already installed" >> $GITHUB_STEP_SUMMARY
        fi
