name: _build (Reusable workflow)

on:
  workflow_call:
    inputs:
      build-project:
        description: Path to the project to build (if empty, null, or whitespace, builds the solution or the project in the current directory)
        type: string
        required: false

      runner-os:
        description: Runner OS
        type: string
        default: ubuntu-latest

      dotnet-version:
        description: Version of .NET SDK to use (default 10.0.x)
        type: string
        default: 10.0.x

      configuration:
        description: The type of build to produce, e.g. Release vs Debug (default Release)
        type: string
        default: Release

      preprocessor-symbols:
        description: Preprocessor symbols to pass to the compiler (default - none)
        type: string
        default: ""

      minver-tag-prefix:
        description: MinVer tag prefix to use for version calculation. Cannot be null or empty!
        type: string
        default: v

      minver-prerelease-id:
        description: MinVer pre-release identifiers to use for version calculation. Cannot be null or empty!
        type: string
        default: preview.0

permissions:
  contents: read
  packages: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  GH_TOKEN: ${{ github.token }}
  GH_ACTOR: ${{ github.actor }}
  VERBOSE: ${{ vars.VERBOSE || false }}

jobs:
  # Compile the project and optionally cache the build artifacts
  build:
    name: Build on ${{ inputs.runner-os }}
    runs-on: ${{ inputs.runner-os }}
    permissions:
      contents: read
      packages: read
    steps:
      # Clone the repository with full Git history for version calculation
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup DevOps environment variables
        uses: vmelamed/vm2.DevOps/.github/actions/setup-env@main

      - name: Setup .NET and the dependencies cache
        uses: vmelamed/vm2.DevOps/.github/actions/cache-dependencies@main
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          runner-os: ${{ inputs.runner-os }}
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}

      - name: Build
        id: build
        shell: bash
        run: |
          build.sh \
              "${{ inputs.build-project }}" \
              --configuration "${{ inputs.configuration }}" \
              --define "${{ inputs.preprocessor-symbols }}" \
              --minver-tag-prefix "${{ inputs.minver-tag-prefix }}" \
              --minver-prerelease-id "${{ inputs.minver-prerelease-id }}"

      - name: Detect SDK drift on failure
        if: failure()
        shell: bash
        env:
          REFRESH_WF_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/RefreshLockfiles.yaml
        run: |
          if dotnet restore --locked-mode 2>&1 | grep -q "NU1004"; then
              {
                  echo "## ⚠️ SDK version drift"
                  echo ""
                  echo "The NuGet lock files are stale — the runner's .NET SDK changed implicit"
                  echo "package versions (e.g. \`Microsoft.NET.ILLink.Tasks\`)."
                  echo ""
                  echo "**Fix (CI):** trigger the [Refresh Lock Files]($REFRESH_WF_URL) workflow"
                  echo "(scheduled every Monday 05:00 ET, or run manually via \`workflow_dispatch\`)."
                  echo ""
                  echo "**Fix (local):**"
                  echo "\`\`\`"
                  echo "sudo apt upgrade dotnet-sdk-10.0"
                  echo "dotnet restore --force-evaluate"
                  echo "\`\`\`"
                  echo "Then re-push."
              } >> "$GITHUB_STEP_SUMMARY"
          fi

      # Make the compiled binaries and intermediate files available to the downstream jobs (test, benchmarks, pack) of
      # this run. Artifacts -- not the cache -- are the intra-run handoff mechanism: the cache service is designed for
      # cross-run reuse and gives no read-after-write guarantee, so a freshly saved entry may not be visible to a lookup
      # seconds later (observed 2026-06-11: 4/4 deterministic restore misses ~25s after a verified save).
      # The slug keeps artifact names unique across the build matrix legs (artifact names are immutable per run).
      - name: Compute build artifact slug
        id: slug
        shell: bash
        env:
          BUILD_PROJECT: ${{ inputs.build-project }}
        run: |
          slug=$(printf '%s' "${BUILD_PROJECT}" | tr -c 'A-Za-z0-9.\n' '-')
          echo "slug=${slug:-root}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts-${{ runner.os }}-${{ inputs.configuration }}-${{ steps.slug.outputs.slug }}
          retention-days: 1
          if-no-files-found: error
          overwrite: true
          path: |
            **/bin/${{ inputs.configuration }}
            **/obj
