name: _pack (Reusable workflow)

on:
  workflow_call:
    inputs:
      package-project:
        description: Path to the project to pack (cannot be null or empty string)
        type: string
        required: true

      runner-os:
        description: Runner OS
        type: string
        default: ubuntu-latest

      dotnet-version:
        description: Version of .NET SDK to use (default 10.0.x)
        type: string
        default: 10.0.x

      configuration:
        description: The type of build to produce, e.g. Release vs Debug (default Release)
        type: string
        default: Release

      preprocessor-symbols:
        description: Preprocessor symbols to pass to the compiler (default - none)
        type: string
        default: ""

      minver-tag-prefix:
        description: MinVer tag prefix to use for version calculation. Cannot be null or empty!
        type: string
        default: v

      minver-prerelease-id:
        description: MinVer pre-release identifiers to use for version calculation. Cannot be null or empty!
        type: string
        default: preview.0

      skip-build-cache:
        description: >-
          Skip downloading the build job's artifacts and build during pack instead.
          Use for projects that don't require a separate build step (e.g., template packages).
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  VERBOSE: ${{ vars.VERBOSE || false }}

jobs:
  # Validate that the project can be packed into a NuGet package
  pack:
    name: Pack on ${{ inputs.runner-os }}
    runs-on: ${{ inputs.runner-os }}
    permissions:
      contents: read
      packages: read
    steps:
      # Clone the repository with full Git history for version calculation
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          filter: tree:0

      # Clone only the scripts from vm2.DevOps, so that we can run the composite
      # action .github/actions/scripts/action.yaml for both local and external calls
      - name: Setup DevOps
        uses: vmelamed/vm2.DevOps/.github/actions/setup-env@main

      - name: Setup .NET and the dependencies cache
        uses: vmelamed/vm2.DevOps/.github/actions/cache-dependencies@main
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          runner-os: ${{ inputs.runner-os }}
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}

      # Retrieve compiled binaries from the build job. Artifacts (not the cache) are the intra-run handoff:
      # the cache gives no read-after-write guarantee within a run.
      - name: Download build artifacts
        if: ${{ !inputs.skip-build-cache }}
        uses: actions/download-artifact@v8
        with:
          pattern: build-artifacts-${{ runner.os }}-${{ inputs.configuration }}-*
          merge-multiple: true
          path: downloaded/

      - name: Extract build artifacts
        if: ${{ !inputs.skip-build-cache }}
        shell: bash
        run: |
          find downloaded/ -name '*.tar.gz' -exec tar xzf {} \;

      # A pattern download does not fail on zero matches, so verify explicitly (the equivalent of fail-on-cache-miss)
      - name: Verify build artifacts were downloaded
        if: ${{ !inputs.skip-build-cache }}
        shell: bash
        run: |
          find . -type d -path "*/bin/${{ inputs.configuration }}" -print -quit | grep -q . || {
              echo "::error::No build artifacts were downloaded from the build job."
              exit 1
          }

      - name: Pack
        id: pack
        shell: bash
        run: |
          pack.sh \
              "${{ inputs.package-project }}" \
              --configuration "${{ inputs.configuration }}" \
              --define "${{ inputs.preprocessor-symbols }}" \
              --minver-tag-prefix "${{ inputs.minver-tag-prefix }}" \
              --minver-prerelease-id "${{ inputs.minver-prerelease-id }}"
