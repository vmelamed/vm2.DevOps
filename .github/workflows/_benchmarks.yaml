name: _benchmarks-bencher (Reusable workflow with Bencher.dev integration)

on:
  workflow_call:
    inputs:
      benchmark-project:
        description: Path to the benchmark project to run benchmarks against (cannot be null or empty string)
        type: string
        required: true

      runner-os:
        description: Runner OS (cannot be null or empty string, default ubuntu-latest)
        type: string
        default: ubuntu-latest

      dotnet-version:
        description: Version of .NET SDK to use (cannot be null or empty string, default 10.0.x)
        type: string
        default: 10.0.x

      configuration:
        description: The type of build to produce, e.g. Release vs Debug (cannot be null or empty string, default Release)
        type: string
        default: Release

      preprocessor-symbols:
        description: Preprocessor symbols to pass to the compiler
        type: string
        default: ""

      minver-tag-prefix:
        description: MinVer tag prefix to use for version calculation. Cannot be null or empty!
        type: string
        default: v

      minver-prerelease-id:
        description: MinVer default pre-release identifiers to use for version calculation. Cannot be null or empty!
        type: string
        default: preview.0

      max-regression-pct:
        description: Maximum acceptable performance regression percentage (used for Bencher threshold)
        type: number
        default: 20 # percent

      max-gen1-collects:
        description: >-
          Maximum acceptable Gen1 GC collections per 1000 operations. Applied as a Bencher *static* (absolute) upper
          threshold, not a percentage: GC counts sit near zero, where a percentage test is degenerate.
        type: number
        default: 2

      max-gen2-collects:
        description: >-
          Maximum acceptable Gen2 GC collections per 1000 operations. Applied as a Bencher *static* (absolute) upper
          threshold, not a percentage: GC counts sit near zero, where a percentage test is degenerate.
        type: number
        default: 1

      reset-benchmark-thresholds:
        description: Whether to reset Bencher thresholds if some degradation is expected
        type: boolean
        default: false

    secrets:
      BENCHER_API_TOKEN:
        description: Bencher.dev API token for authentication
        required: true

permissions:
  contents: read
  packages: read # Required for downloading dependencies and tools
  checks: write # Required for Bencher to create GitHub Checks
  pull-requests: write # Required for Bencher to comment on PRs

env:
  ARTIFACTS_DIR: ./BenchmarkArtifacts
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  VERBOSE: ${{ vars.VERBOSE || false }}

jobs:
  benchmarks:
    name: Benchmarks (${{ inputs.runner-os }})
    permissions:
      checks: write # Required for Bencher to create GitHub Checks
      pull-requests: write # Required for Bencher to comment on PRs
    runs-on: ${{ inputs.runner-os }}
    steps:
      # Install Bencher CLI (install early so if it fails, we fail fast before doing extra work)
      - name: Compute Bencher cache daily key
        id: cache-date
        run: echo "day=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Cache Bencher CLI
        id: cache-bencher
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/bencher
          key: bencher-cli-${{ runner.os }}-${{ steps.cache-date.outputs.day }}
          restore-keys: |
            bencher-cli-${{ runner.os }}-

      - name: Install Bencher CLI
        if: steps.cache-bencher.outputs.cache-hit != 'true'
        uses: bencherdev/bencher@v0.6.6

      # Clone the repository with full Git history
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup DevOps environment variables
        uses: vmelamed/vm2.DevOps/.github/actions/setup-env@main

      - name: Setup .NET and the dependencies cache
        uses: vmelamed/vm2.DevOps/.github/actions/cache-dependencies@main
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          runner-os: ${{ inputs.runner-os }}
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}

      # Retrieve compiled binaries from the build job. Artifacts (not the cache) are the intra-run handoff:
      # the cache gives no read-after-write guarantee within a run.
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: build-artifacts-${{ runner.os }}-${{ inputs.configuration }}-*
          merge-multiple: true
          path: downloaded/

      - name: Extract build artifacts
        shell: bash
        run: |
          find downloaded/ -name '*.tar.gz' -exec tar xzf {} \;

      # A pattern download does not fail on zero matches, so verify explicitly (the equivalent of fail-on-cache-miss)
      - name: Verify build artifacts were downloaded
        shell: bash
        run: |
          find . -type d -path "*/bin/${{ inputs.configuration }}" -print -quit | grep -q . || {
              echo "::error::No build artifacts were downloaded from the build job."
              exit 1
          }

      # Run benchmarks using BenchmarkDotNet and export JSON results
      - name: Run BenchmarkDotNet benchmarks
        id: run-benchmarks
        shell: bash
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source "$DEVOPS_LIB_DIR/gh_core.sh"

          trace "Running benchmarks for project: ${{ inputs.benchmark-project }} with configuration: ${{ inputs.configuration }} on runner OS: ${{ inputs.runner-os }}"

          run-benchmarks.sh \
              ${{ inputs.benchmark-project }} \
              --configuration "${{ inputs.configuration }}" \
              --define "${{ inputs.preprocessor-symbols }}" \
              --minver-tag-prefix "${{ inputs.minver-tag-prefix }}" \
              --minver-prerelease-id "${{ inputs.minver-prerelease-id }}" \
              --artifacts "${{ env.ARTIFACTS_DIR }}"

          trace "Benchmarks completed. Preparing to upload results to Bencher.dev with max regression threshold of ±${{ inputs.max-regression-pct }}%."

          # Calculate thresholds as decimals (e.g., 10% -> LOWER_THRESHOLD=0.90, 10% -> UPPER_THRESHOLD=0.10)
          LOWER_THRESHOLD=$(echo "scale=4; ${{ inputs.max-regression-pct }} / 100" | bc)
          UPPER_THRESHOLD=$(echo "scale=4; ${{ inputs.max-regression-pct }} / 100" | bc)

          # Compute Bencher project slug from repository name, e.g., vmelamed/vm2.DevOps -> vm2-devops
          REPO_NAME="${{ github.repository }}"
          BENCHER_SLUG=$(echo "${REPO_NAME#*/}" | tr '[:upper:]' '[:lower:]' | tr '.' '-')

          reset_benchmark_thresholds="${{ inputs.reset-benchmark-thresholds }}"

          bencher_static=(
              --project "$BENCHER_SLUG"
              --token "$BENCHER_API_TOKEN"
              --testbed "${{ inputs.runner-os }}"
              --adapter c_sharp_dot_net
              # --iter/--fold only matter when more than one result file is uploaded in a single run (Bencher treats each
              # --file as a separate iteration). BenchmarkDotNet's --join normally yields one file, so these are usually
              # inert; when multiple files do appear, median folds them. We avoid mean because Bencher discourages it here.
              --iter 1
              --fold median
              --err
          )

          threshold_latency=(
              --threshold-measure latency
              --threshold-test percentage
              --threshold-max-sample-size 64
              --threshold-lower-boundary _
              --threshold-upper-boundary "$UPPER_THRESHOLD"
          )

          threshold_throughput=(
              --threshold-measure throughput
              --threshold-test percentage
              --threshold-max-sample-size 64
              --threshold-lower-boundary "$LOWER_THRESHOLD"
              --threshold-upper-boundary _
          )

          threshold_allocated=(
              --threshold-measure allocated
              --threshold-test percentage
              --threshold-max-sample-size 64
              --threshold-lower-boundary _
              --threshold-upper-boundary "$UPPER_THRESHOLD"
          )

          threshold_gen1_collects=(
              --threshold-measure gen1-collects
              --threshold-test static
              --threshold-lower-boundary _
              --threshold-upper-boundary "${{ inputs.max-gen1-collects }}"
          )

          threshold_gen2_collects=(
              --threshold-measure gen2-collects
              --threshold-test static
              --threshold-lower-boundary _
              --threshold-upper-boundary "${{ inputs.max-gen2-collects }}"
          )

          # Build bencher run command
          BENCHER_ARGS=(
              ${bencher_static[@]}
              ${threshold_latency[@]}
              ${threshold_throughput[@]}
              ${threshold_allocated[@]}
              ${threshold_gen1_collects[@]}
              ${threshold_gen2_collects[@]}
          )

          # if on PR - add PR data
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              # The PR branch is tracked as its own ephemeral branch, forked from main with main's thresholds cloned onto it:
              pr_base_sha="${{ github.event.pull_request.base.sha || '' }}"
              BENCHER_ARGS+=(
                --branch "${{ github.head_ref }}"
                --start-point main
                --start-point-clone-thresholds
                --start-point-reset                # rebuilds the branch from the start point every run — compare "PR vs main"
                --start-point-hash "$pr_base_sha"  # pin the baseline to the exact commit the PR branched from
                --github-actions "$GH_TOKEN"       # authenticate to GitHub for commenting on the PR and creating checks
                --ci-number "${{ github.event.pull_request.number }}"
              )
          elif [[ "${{ github.ref_name }}" != "main" ]]; then
              BENCHER_ARGS+=(
                # fork-from-main, this branch accumulates history across pushes
                --branch "${{ github.ref_name }}"
                --start-point main
                --start-point-clone-thresholds
              )
          else
              BENCHER_ARGS+=(
                --branch main
              )
          fi

          # Only reset thresholds when explicitly requested
          if [[ "$reset_benchmark_thresholds" == "true" ]]; then
              trace "Resetting Bencher thresholds (reset_thresholds=true)"
              BENCHER_ARGS+=(--thresholds-reset)
          fi

          # Add all benchmark result files
          for file in ${{ env.ARTIFACTS_DIR }}/results/*-report-full-compressed.json; do
              if [[ -s "$file" ]]; then
                  trace "Adding benchmark result file: $file"
                  BENCHER_ARGS+=(--file "$file")
              fi
          done

          if [[ $verbose == "true" ]]; then
              trace "Looking for benchmark result files matching: ${{ env.ARTIFACTS_DIR }}/results/*-report-full-compressed.json:"
              trace "$(ls -l ${{ env.ARTIFACTS_DIR }}/results/*-report-full-compressed.json)"

              declare -a sanitized_bencher_args=("${BENCHER_ARGS[@]}")

              for i in "${!sanitized_bencher_args[@]}"; do
                  if [[ "${sanitized_bencher_args[$i]}" == "--token" ||
                        "${sanitized_bencher_args[$i]}" == "--github-actions" ]] &&
                     (( i + 1 < ${#sanitized_bencher_args[@]} )); then
                      sanitized_bencher_args[$((i + 1))]="$secret_str"
                  fi
              done

              trace "Running command: bencher run ${sanitized_bencher_args[*]}"
          fi

          # Capture Bencher's output so we can echo it to the log and tell threshold alerts apart from
          # transport failures. set +e so a non-zero bencher (alerts via --err, or a real failure) does
          # not abort the step before we read its exit code.
          set +e
          bencher_output=$(bencher run "${BENCHER_ARGS[@]}" 2>&1); bencher_rc=$?
          set -e

          printf '%s\n' "$bencher_output"   # surface bencher's output in the job log

          if [[ $bencher_rc -eq 0 ]]; then
              info "The upload to Bencher completed successfully with no alerts."
          elif [[ "$bencher_output" == *"Alerts detected"* ]]; then
              warning "Bencher uploaded results but detected threshold alerts."
              exit "$bencher_rc"
          else
              error "Bencher run failed before completing successfully."
              exit "$bencher_rc"
          fi

      # Upload benchmark results as workflow artifacts for manual inspection
      - name: Upload benchmark results artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results-${{ inputs.runner-os }}
          path: ${{ env.ARTIFACTS_DIR }}
          if-no-files-found: warn
          overwrite: true

      # Add summary to job
      - name: Add Bencher results to summary
        if: always()
        shell: bash
        run: |
          source "$DEVOPS_LIB_DIR/gh_core.sh"

          REPO_NAME="${{ github.repository }}"
          BENCHER_SLUG=$(echo "${REPO_NAME#*/}" | tr '[:upper:]' '[:lower:]' | tr '.' '-')
          BENCHER_BRANCH="${{ github.head_ref || github.ref_name }}"

          {
              echo "### 📊 Benchmark Results"
              echo ""
              echo "Project: **${{ github.repository }}**"
              echo "Branch: **${BENCHER_BRANCH}**"
              echo "Testbed: **${{ inputs.runner-os }}**"
              echo "Threshold: **±${{ inputs.max-regression-pct }}%**"
              echo "GC caps (per 1000 ops):"
              echo "   **Gen1 ≤ ${{ inputs.max-gen1-collects }}**"
              echo "   **Gen2 ≤ ${{ inputs.max-gen2-collects }}**"
              echo ""
              echo "🌐 [View detailed results on Bencher](https://bencher.dev/console/projects/${BENCHER_SLUG})"
          } | to_summary
