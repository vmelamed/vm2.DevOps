name: _release (Reusable workflow)

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: Version of .NET SDK to use (cannot be null or empty string, default 10.0.x)
        type: string
        required: true

      package-projects:
        description: >-
          JSON array of project/solution paths to package and publish, e.g. '["src/Project1/Project1.csproj", "src/Project2/Project2.csproj"]'.
          If empty array, auto-detects root .sln or .csproj files.
        type: string
        default: "[]"

      package-projects-len:
        description: Length of the JSON array of project/solution paths to package and publish.
        type: string
        default: "0"

      preprocessor-symbols:
        description: Preprocessor symbols to pass to the compiler
        type: string
        required: true

      minver-tag-prefix:
        description: "Prefix for git tags to be recognized by MinVer (default 'v')"
        type: string
        required: true

      minver-prerelease-id:
        description: Prefix for the prerelease tag, e.g. 'preview.0', 'alpha', 'beta', 'rc', etc. (cannot be null or empty string, default 'preview.0')
        type: string
        required: true

      reason:
        description: Reason for manual release
        type: string
        required: true

      nuget-server:
        description: NuGet server to publish to (nuget or github)
        type: string
        required: true

      save-package-artifacts:
        description: Upload package(s) as workflow artifacts
        type: boolean
        required: true

    secrets:
      RELEASE_PAT:
        description: >-
          PAT for a user listed as a bypass actor (e.g. Admin) in the branch ruleset protecting main.
          Required to push changelog commits and version tags directly to main.
        required: true

      NUGET_API_KEY:
        description: >-
          Token for authentication to the NuGet server - must be issued by the selected nuget-server.
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_SERVER: ${{ inputs.nuget-server || 'nuget' }}
  ARTIFACTS_DIR: artifacts/pack
  VERBOSE: ${{ vars.VERBOSE || false }}

jobs:
  compute-version:
    name: Compute Release Version
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
      release-tag: ${{ steps.version.outputs.release-tag }}
      reason: ${{ steps.version.outputs.reason }}
      needs-empty-commit: ${{ steps.version.outputs.needs-empty-commit }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup DevOps environment variables
        uses: vmelamed/vm2.DevOps/.github/actions/setup-env@main

      - name: Validate and compute release version
        id: version
        shell: bash
        run: |
          git fetch --tags --force
          compute-release-version.sh \
              --minver-tag-prefix '${{ inputs.minver-tag-prefix }}' \
              --reason '${{ inputs.reason }}'

  changelog-and-tag:
    name: Update CHANGELOG.md and Create Release Tag
    runs-on: ubuntu-latest
    needs:
      - compute-version
    steps:
      - name: Checkout (full history on main)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup DevOps environment variables
        uses: vmelamed/vm2.DevOps/.github/actions/setup-env@main

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Update CHANGELOG.md and create release tag
        shell: bash
        run: |
          changelog-and-tag.sh \
              --tag "${{ needs.compute-version.outputs.release-tag }}" \
              --reason "${{ inputs.reason }}" \
              --minver-tag-prefix "${{ inputs.minver-tag-prefix }}" \
              --needs-empty-commit "${{ needs.compute-version.outputs.needs-empty-commit }}"

  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - compute-version
      - changelog-and-tag
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(inputs.package-projects) }}
    if: fromJSON(inputs.package-projects-len) > 0
    steps:
      - name: Checkout release tag (full history)
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.compute-version.outputs.release-tag }}
          fetch-tags: true
          fetch-depth: 0
          filter: tree:0

      - name: Setup DevOps environment variables
        uses: vmelamed/vm2.DevOps/.github/actions/setup-env@main

      - name: Setup .NET and the dependencies cache
        uses: vmelamed/vm2.DevOps/.github/actions/cache-dependencies@main
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          runner-os: ubuntu-latest
          github-token: ${{ github.token }}
          github-actor: ${{ github.actor }}

      - name: Build, Package and Publish release to NuGet server
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          publish-package.sh \
              --package-project "${{ matrix.project }}" \
              --define "${{ inputs.preprocessor-symbols }}" \
              --minver-tag-prefix "${{ inputs.minver-tag-prefix }}" \
              --reason "${{ needs.compute-version.outputs.reason }}" \
              --nuget-server "${{ inputs.nuget-server }}" \
              --artifacts-saved "${{ inputs.save-package-artifacts }}" \
              --artifacts-dir "${{ env.ARTIFACTS_DIR }}"

      - name: Upload package artifact
        if: inputs.save-package-artifacts == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: nuget-packages-${{ needs.compute-version.outputs.release-tag }}-${{ hashFiles(matrix.project) }}
          path: artifacts/pack/*.nupkg
          if-no-files-found: ignore
          overwrite: true
