name: _refresh_lockfiles (Reusable workflow)

# Reusable workflow that refreshes NuGet lock files when SDK-implicit
# packages (e.g. Microsoft.NET.ILLink.Tasks) change between runner
# SDK versions.  Opens a PR when lock files drift.

on:
  workflow_call:
    inputs:
      dotnet-version:
        description: .NET SDK version pattern (e.g. "10.0.x")
        type: string
        default: "10.0.x"

      runner-os:
        description: Runner OS
        type: string
        default: ubuntu-latest

      base-branch:
        description: Branch to target for the PR (default repo's default branch)
        type: string
        default: ""

    secrets:
      GH_PACKAGES_TOKEN:
        description: PAT for GitHub Packages NuGet feed
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh NuGet lock files
    runs-on: ${{ inputs.runner-os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base-branch || github.event.repository.default_branch }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-quality: ga

      - name: Authenticate with GitHub Packages
        if: ${{ secrets.GH_PACKAGES_TOKEN != '' }}
        run: |
          dotnet nuget update source github.vm2 \
            --username ${{ github.actor }} \
            --password ${{ secrets.GH_PACKAGES_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore with --force-evaluate
        run: dotnet restore --force-evaluate

      - name: Check for lock file changes
        id: changes
        run: |
          if git diff --quiet -- '**/packages.lock.json'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Lock files are up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Lock files have drifted:"
            git diff --stat -- '**/packages.lock.json'
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: chore/refresh-lockfiles
          delete-branch: true
          title: "deps: Refresh NuGet lock files"
          body: |
            Automated lock file refresh triggered by SDK-implicit package drift.

            The runner's .NET SDK resolved different implicit package versions
            (e.g. `Microsoft.NET.ILLink.Tasks`) than what is recorded in the
            lock files.  This PR updates them via `dotnet restore --force-evaluate`.
          commit-message: "deps: refresh NuGet lock files"
          labels: dependencies
